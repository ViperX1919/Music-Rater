<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music Rater">
<title>Music Rater</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--surface:#0f111a;--s2:#161924;--s3:#1e2233;
  --border:#252a3a;--b2:#2e3448;
  --accent:#c8a84b;--a2:#e2c577;--adim:rgba(200,168,75,0.12);--aglow:rgba(200,168,75,0.25);
  --text:#e2e4ef;--dim:#7b829e;--faint:#454b65;
  --green:#5acea0;--yellow:#e2c577;--red:#e07070;--blue:#6ba3e0;--purple:#a78bfa;
  --r:10px;--rl:16px;--t:0.2s ease;
  --serif:'Cormorant',Georgia,serif;--sans:'DM Sans',sans-serif;--mono:'Fira Code',monospace;
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;overflow:hidden;position:fixed;width:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Topbar */
#topbar{background:var(–surface);border-bottom:1px solid var(–border);padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:20;touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden}
.logo{font-family:var(–serif);font-size:20px;font-weight:700;color:var(–accent);cursor:pointer;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:12px;color:var(–dim);flex:1;min-width:0;overflow:hidden;touch-action:none}
.bci{cursor:pointer;transition:color var(–t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bci:active{color:var(–accent)}.bci.active{color:var(–text);font-weight:500}
.bcs{color:var(–faint);flex-shrink:0}
.topbar-right{display:flex;gap:6px;flex-shrink:0;align-items:center;touch-action:none}
.icon-btn{background:none;border:1px solid var(–border);border-radius:var(–r);color:var(–faint);font-size:16px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(–t);flex-shrink:0}
.icon-btn:active{color:var(–accent);border-color:var(–accent);background:var(–adim)}

/* Now Playing */
.np-btn{background:none;border:1px solid var(–border);border-radius:var(–r);color:var(–faint);height:34px;display:none;align-items:center;gap:6px;cursor:pointer;transition:all var(–t);flex-shrink:0;padding:0 10px;font-family:var(–sans);font-size:11px}
.np-btn.on{display:flex}.np-btn:active{color:var(–green);border-color:var(–green);background:rgba(90,206,160,0.1)}
.np-pulse{width:7px;height:7px;border-radius:50%;background:var(–green);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.np-label{color:var(–green);font-weight:500;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Content */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px;padding-bottom:calc(20px + var(–sb));-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(–r);border:none;font-family:var(–sans);font-size:13px;font-weight:500;cursor:pointer;transition:all var(–t);white-space:nowrap}
.btn-p{background:var(–accent);color:#0a0b0d}.btn-p:active{background:var(–a2)}
.btn-g{background:transparent;color:var(–dim);border:1px solid var(–b2)}.btn-g:active{background:var(–s2);color:var(–text)}
.btn-d{background:transparent;color:var(–red);border:1px solid rgba(224,112,112,0.3)}.btn-d:active{background:rgba(224,112,112,0.1)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}

/* Typography */
.page-title{font-family:var(–serif);font-size:36px;font-weight:700;line-height:1.05;margin-bottom:4px}
.page-title em{color:var(–accent);font-style:italic}
.page-sub{font-size:13px;color:var(–dim);margin-bottom:16px}
.sec-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(–faint);margin-bottom:10px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);padding:13px 14px;cursor:pointer;transition:all var(–t)}
.stat-card:active{background:var(–s2)}
.stat-val{font-family:var(–mono);font-size:22px;font-weight:500;color:var(–accent);line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(–faint);letter-spacing:1px;text-transform:uppercase}

/* Search Bar */
.search-bar{display:flex;gap:8px;margin-bottom:18px}
.search-input{flex:1;background:var(–s2);border:1px solid var(–b2);border-radius:var(–r);padding:9px 13px;font-family:var(–sans);font-size:14px;color:var(–text);outline:none;-webkit-appearance:none}
.search-input:focus{border-color:var(–accent)}
.search-input::placeholder{color:var(–faint)}

/* Sort Bar */
.sort-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.sort-btn{background:var(–s2);border:1px solid var(–border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(–dim);cursor:pointer;white-space:nowrap;transition:all var(–t);flex-shrink:0}
.sort-btn.active{background:var(–adim);border-color:var(–accent);color:var(–a2)}

/* Artist Grid */
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.artist-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);padding:16px 14px;cursor:pointer;transition:all var(–t);position:relative;overflow:hidden}
.artist-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(–accent),transparent);opacity:0;transition:opacity var(–t)}
.artist-card:active{background:var(–s2);transform:scale(.98)}.artist-card:active::before{opacity:1}
.ac-avatar{width:38px;height:38px;border-radius:50%;background:var(–s3);border:1px solid var(–b2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(–accent);font-family:var(–serif);margin-bottom:10px;text-transform:uppercase}
.ac-name{font-family:var(–serif);font-size:17px;font-weight:600;margin-bottom:2px;line-height:1.2}
.ac-meta{font-size:11px;color:var(–faint);margin-bottom:8px}
.ac-score{font-family:var(–mono);font-size:19px;font-weight:500}

/* Chart */
.chart-section{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);padding:16px;margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.chart-title{font-family:var(–serif);font-size:14px;font-weight:600;color:var(–dim)}
.chart-badge{font-family:var(–mono);font-size:12px;background:var(–adim);color:var(–a2);border:1px solid rgba(200,168,75,0.2);border-radius:6px;padding:2px 9px}
.chart-wrap{height:160px;position:relative}

/* Album List */
.album-list{display:flex;flex-direction:column;gap:8px}
.album-row{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all var(–t)}
.album-row:active{background:var(–s2)}
.album-year{font-family:var(–mono);font-size:11px;color:var(–faint);min-width:32px;flex-shrink:0}
.album-row-main{flex:1;min-width:0}
.album-row-name{font-family:var(–serif);font-size:17px;font-weight:600;line-height:1.2}
.album-row-meta{font-size:11px;color:var(–faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.mood-tag{font-size:10px;background:var(–s3);border:1px solid var(–border);border-radius:10px;padding:1px 7px;color:var(–dim)}
.album-row-score{font-family:var(–mono);font-size:19px;font-weight:500;flex-shrink:0}

/* Album Page */
.album-header{margin-bottom:20px}
.album-title{font-family:var(–serif);font-size:32px;font-weight:700;line-height:1.05}
.album-artist{font-family:var(–serif);font-size:17px;font-style:italic;color:var(–accent);margin-bottom:8px}
.meta-pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.meta-pill{background:var(–s2);border:1px solid var(–border);border-radius:20px;padding:2px 10px;font-size:11px;color:var(–dim)}

/* Notes */
.notes-area{background:var(–s2);border:1px solid var(–b2);border-radius:var(–r);padding:10px 13px;font-family:var(–sans);font-size:13px;color:var(–text);width:100%;outline:none;resize:none;min-height:60px;line-height:1.6;margin-bottom:16px;-webkit-appearance:none}
.notes-area:focus{border-color:var(–accent)}
.notes-area::placeholder{color:var(–faint)}

/* Mood Tags Selector */
.mood-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.mood-opt{font-size:11px;background:var(–s2);border:1px solid var(–border);border-radius:10px;padding:3px 10px;color:var(–dim);cursor:pointer;transition:all var(–t)}
.mood-opt.sel{background:var(–adim);border-color:var(–accent);color:var(–a2)}

/* Song List */
.song-list{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);overflow:hidden}
.song-list-head{display:grid;grid-template-columns:24px 1fr 44px;gap:8px;padding:9px 14px;border-bottom:1px solid var(–border);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(–faint)}
.song-row{display:grid;grid-template-columns:24px 1fr 44px;gap:8px;padding:11px 14px;align-items:center;border-bottom:1px solid var(–border);transition:background var(–t)}
.song-row:last-child{border-bottom:none}.song-row:active{background:var(–s2)}
.song-row.highlighted{background:rgba(90,206,160,0.1)}
.song-num{font-family:var(–mono);font-size:11px;color:var(–faint);text-align:center}
.song-main{display:flex;flex-direction:column;gap:5px;min-width:0}
.song-name-row{display:flex;align-items:center;gap:5px}
.song-name{font-size:13px;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.star-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;opacity:.4;transition:opacity var(–t)}
.star-btn.starred{opacity:1}
.song-del{background:none;border:none;color:var(–faint);font-size:12px;cursor:pointer;padding:2px 3px;border-radius:4px;flex-shrink:0}
.song-del:active{color:var(–red)}
.rating-row{display:flex;align-items:center;gap:7px}
input[type=range].rslider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;background:var(–s3);outline:none;cursor:pointer}
input[type=range].rslider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(–accent);cursor:pointer;box-shadow:0 0 0 3px var(–adim)}
input[type=range].rslider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(–accent);cursor:pointer;border:none}
.song-score{font-family:var(–mono);font-size:14px;font-weight:500;text-align:right;white-space:nowrap}

/* Add Song Bar */
.add-song-bar{padding:10px 14px;border-top:1px solid var(–border);display:flex;gap:8px}
.add-song-input{flex:1;background:var(–s2);border:1px solid var(–b2);border-radius:var(–r);padding:7px 11px;font-family:var(–sans);font-size:13px;color:var(–text);outline:none;-webkit-appearance:none}
.add-song-input:focus{border-color:var(–accent)}
.add-song-input::placeholder{color:var(–faint)}

/* Rating colors */
.r-hi{color:var(–green)}.r-mid{color:var(–yellow)}.r-lo{color:var(–red)}.r-none{color:var(–faint)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(–faint)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-title{font-family:var(–serif);font-size:19px;color:var(–dim);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.8}

/* Action Row */
.action-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}

/* Listening Log */
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(–border)}
.log-entry:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;background:var(–green);flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-size:13px;color:var(–text)}
.log-date{font-size:11px;color:var(–faint)}

/* Decade View */
.decade-section{margin-bottom:24px}
.decade-label{font-family:var(–serif);font-size:22px;font-weight:700;color:var(–accent);margin-bottom:12px;border-bottom:1px solid var(–border);padding-bottom:6px}

/* Top 10 */
.top-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(–border)}
.top-item:last-child{border-bottom:none}
.top-rank{font-family:var(–mono);font-size:13px;color:var(–faint);min-width:22px;text-align:right}
.top-info{flex:1;min-width:0}
.top-name{font-size:13px;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:11px;color:var(–faint)}
.top-score{font-family:var(–mono);font-size:16px;font-weight:500}

/* Wrapped */
.wrapped-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.wrapped-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);padding:16px}
.wrapped-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(–faint);margin-bottom:6px}
.wrapped-value{font-family:var(–serif);font-size:20px;font-weight:700;color:var(–text);line-height:1.2}
.wrapped-sub{font-size:11px;color:var(–dim);margin-top:3px}
.wrapped-full{grid-column:1/-1}
.wrapped-accent{color:var(–accent)}

/* Compare */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.compare-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–rl);padding:14px;text-align:center}
.compare-name{font-family:var(–serif);font-size:16px;font-weight:700;margin-bottom:4px}
.compare-score{font-family:var(–mono);font-size:32px;font-weight:500;margin-bottom:4px}
.compare-winner{border-color:var(–accent);background:var(–adim)}
.compare-bar-wrap{height:6px;background:var(–s3);border-radius:3px;margin:8px 0;overflow:hidden}
.compare-bar{height:100%;border-radius:3px;background:var(–accent);transition:width .6s ease}
.compare-song-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(–border);font-size:12px}
.compare-song-row:last-child{border-bottom:none}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(–surface);border:1px solid var(–b2);border-radius:var(–rl) var(–rl) 0 0;padding:22px 20px calc(22px + var(–sb));width:100%;max-width:520px;animation:slideUp .2s ease;max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:var(–serif);font-size:21px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:13px}
.modal-label{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(–faint);margin-bottom:6px}
.modal-input{width:100%;background:var(–s2);border:1px solid var(–b2);border-radius:var(–r);padding:9px 12px;font-family:var(–sans);font-size:15px;color:var(–text);outline:none;-webkit-appearance:none}
.modal-input:focus{border-color:var(–accent)}
.modal-input::placeholder{color:var(–faint)}
textarea.modal-input{resize:none;height:100px;line-height:1.6}
.modal-hint{font-size:11px;color:var(–faint);margin-top:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* Settings */
.settings-section{margin-bottom:18px}
.settings-section-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(–faint);margin-bottom:8px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(–s2);border:1px solid var(–border);border-radius:var(–r);margin-bottom:7px;gap:10px}
.settings-row-title{font-size:13px;font-weight:500;color:var(–text);margin-bottom:1px}
.settings-row-sub{font-size:11px;color:var(–faint)}
.settings-row-action{flex-shrink:0}
.sp-connected{display:flex;align-items:center;gap:7px;font-size:12px;color:var(–green);font-weight:500}
.sp-dot{width:7px;height:7px;border-radius:50%;background:var(–green);flex-shrink:0}

/* Spotify Search */
.sp-search-wrap{margin-bottom:12px;position:relative}
.sp-results{background:var(–s2);border:1px solid var(–b2);border-radius:var(–r);overflow:hidden;margin-top:6px;max-height:240px;overflow-y:auto}
.sp-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(–border);cursor:pointer;transition:background var(–t)}
.sp-item:last-child{border-bottom:none}.sp-item:active{background:var(–s3)}
.sp-img{width:38px;height:38px;border-radius:4px;object-fit:cover;background:var(–s3);flex-shrink:0}
.sp-info{flex:1;min-width:0}
.sp-name{font-size:13px;font-weight:500;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-sub{font-size:11px;color:var(–faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-arrow{color:var(–faint);font-size:15px;flex-shrink:0}
.sp-loading{padding:14px;text-align:center;font-size:12px;color:var(–faint)}

/* Share Card */
.share-card{background:linear-gradient(135deg,#0f111a,#1e2233);border:1px solid var(–b2);border-radius:var(–rl);padding:24px;margin-bottom:16px;text-align:center}
.share-card-artist{font-family:var(–serif);font-size:13px;color:var(–accent);font-style:italic;margin-bottom:4px}
.share-card-title{font-family:var(–serif);font-size:26px;font-weight:700;margin-bottom:8px}
.share-card-score{font-family:var(–mono);font-size:52px;font-weight:500;color:var(–accent);line-height:1}
.share-card-label{font-size:11px;color:var(–faint);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.share-card-songs{margin-top:16px;text-align:left}
.share-song-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
.share-song-row:last-child{border-bottom:none}

/* Toast */
#toast{position:fixed;bottom:calc(16px + var(–sb));left:50%;transform:translateX(-50%) translateY(80px);background:var(–s3);border:1px solid var(–b2);border-radius:var(–r);padding:8px 15px;font-size:12px;color:var(–text);z-index:200;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(–green);flex-shrink:0}
</style>

</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo" onclick="navigateHome()">♩</div>
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="topbar-right" id="topbar-right">
      <button class="np-btn" id="np-btn" onclick="goToNowPlaying()"></button>
      <button class="icon-btn" onclick="showSettingsModal()" title="Settings">⚙︎</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="toast"><div class="toast-dot"></div><span id="toast-msg">Saved</span></div>
<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */

/* ══════════════════════════════════════════
STORAGE
══════════════════════════════════════════ */
function loadData(){
try{ const r=localStorage.getItem(‘mrdata’); if(r) data=JSON.parse(r); }
catch(e){ data={artists:[],log:[]}; }
if(!data.log) data.log=[];
data.artists.forEach(ar=>{
ar.albums.forEach(al=>{
if(!al.moods) al.moods=[];
if(!al.notes) al.notes=’’;
if(!al.listenCount) al.listenCount=0;
if(!al.lastListened) al.lastListened=null;
al.songs.forEach(s=>{ if(s.starred===undefined) s.starred=false; });
});
});
}

function saveData(){
try{ localStorage.setItem(‘mrdata’,JSON.stringify(data)); toast(‘Saved ✓’); }
catch(e){ toast(‘Save failed’); }
}

/* ══════════════════════════════════════════
UTILS
══════════════════════════════════════════ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ const d=document.createElement(‘div’);d.textContent=s;return d.innerHTML; }
function ini(n){ return (n||’?’).trim().charAt(0).toUpperCase(); }
function rc(r){ if(r===null||r===undefined||isNaN(r))return ‘r-none’; return r>=8?‘r-hi’:r>=6?‘r-mid’:‘r-lo’; }
function fr(r){ if(r===null||r===undefined||isNaN(r))return ‘—’; return parseFloat(r).toFixed(1); }
function avg(songs){ const rated=(songs||[]).filter(s=>s.rating!==null&&s.rating!==undefined&&!isNaN(s.rating)); if(!rated.length)return null; return rated.reduce((a,b)=>a+b.rating,0)/rated.length; }
function albumAvg(al){ return avg(al.songs); }
function artistAvg(ar){ const avgs=(ar.albums||[]).map(albumAvg).filter(v=>v!==null); if(!avgs.length)return null; return avgs.reduce((a,b)=>a+b,0)/avgs.length; }
function sortedAlbums(ar){ return […(ar.albums||[])].sort((a,b)=>{ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return new Date(a.date)-new Date(b.date); }); }
function albumYear(al){ return al.date?new Date(al.date).getFullYear():’—’; }
function fmtDate(ts){ if(!ts)return ‘’; const d=new Date(ts); return d.toLocaleDateString(‘en-AU’,{day:‘numeric’,month:‘short’,year:‘numeric’}); }

function toast(msg,col){
const el=document.getElementById(‘toast’);
document.getElementById(‘toast-msg’).textContent=msg;
el.querySelector(’.toast-dot’).style.background=col||‘var(–green)’;
el.classList.add(‘show’); clearTimeout(el._t);
el._t=setTimeout(()=>el.classList.remove(‘show’),2400);
}

}
function navigateAlbum(aid,alid){

/* ══════════════════════════════════════════
CRUD
══════════════════════════════════════════ */
function addArtist(name){ const ar={id:uid(),name:name.trim(),albums:[]}; data.artists.push(ar); saveData(); navigateArtist(ar.id); }
function deleteArtist(id){ if(!confirm(‘Delete this artist and all their data?’))return; data.artists=data.artists.filter(a=>a.id!==id); saveData(); navigateHome(); }
function addAlbum(aid,name,date){ const ar=data.artists.find(a=>a.id===aid); if(!ar)return; const al={id:uid(),name:name.trim(),date:date||’’,songs:[],moods:[],notes:’’,listenCount:0,lastListened:null}; ar.albums.push(al); saveData(); navigateAlbum(aid,al.id); }
function deleteAlbum(aid,alid){ if(!confirm(‘Delete this album?’))return; const ar=data.artists.find(a=>a.id===aid); if(!ar)return; ar.albums=ar.albums.filter(al=>al.id!==alid); saveData(); navigateArtist(aid); }
function addSongs(aid,alid,names){ const ar=data.artists.find(a=>a.id===aid); const al=ar?.albums.find(al=>al.id===alid); if(!al)return; names.forEach(n=>{if(n.trim())al.songs.push({id:uid(),name:n.trim(),rating:null,starred:false});}); saveData(); render(); }
function deleteSong(aid,alid,sid){ const ar=data.artists.find(a=>a.id===aid); const al=ar?.albums.find(al=>al.id===alid); if(!al)return; al.songs=al.songs.filter(s=>s.id!==sid); saveData(); render(); }
function toggleStar(aid,alid,sid){ const ar=data.artists.find(a=>a.id===aid); const al=ar?.albums.find(al=>al.id===alid); const s=al?.songs.find(s=>s.id===sid); if(!s)return; s.starred=!s.starred; saveData(); const btn=document.getElementById(‘star-’+sid); if(btn){btn.textContent=s.starred?‘⭐’:‘☆’;btn.classList.toggle(‘starred’,s.starred);} }
function setRating(aid,alid,sid,val){ const ar=data.artists.find(a=>a.id===aid); const al=ar?.albums.find(al=>al.id===alid); const s=al?.songs.find(s=>s.id===sid); if(!s)return; s.rating=val; saveData(); const rv=document.getElementById(‘rv-’+sid); if(rv){rv.textContent=fr(val);rv.className=‘song-score ‘+rc(val);} renderAlbumChart(al); const badge=document.getElementById(‘alb-avg’); const a=albumAvg(al); if(badge){badge.textContent=a!==null?a.toFixed(2):’—’;badge.className=‘chart-badge ‘+rc(a);} }
function saveNotes(aid,alid,val){ const ar=data.artists.find(a=>a.id===aid); const al=ar?.albums.find(al=>al.id===alid); if(!al)return; al.notes=val; saveData(); }
function toggleMood(aid,alid,mood){ const ar=data.artists.find(a=>a.id===aid); const al=ar?.albums.find(al=>al.id===alid); if(!al)return; const i=al.moods.indexOf(mood); if(i>=0)al.moods.splice(i,1); else al.moods.push(mood); saveData(); document.querySelectorAll(’.mood-opt’).forEach(el=>{el.classList.toggle(‘sel’,al.moods.includes(el.dataset.mood));}); }

LOG
══════════════════════════════════════════ */
function logListen(artistName,albumName,trackName){
data.log.unshift({ts:Date.now(),artist:artistName,album:albumName,track:trackName});
if(data.log.length>500) data.log=data.log.slice(0,500);
// Update album listen count
const ar=data.artists.find(a=>a.name.toLowerCase()===artistName.toLowerCase());
const al=ar?.albums.find(al=>al.name.toLowerCase()===albumName.toLowerCase());
if(al){al.listenCount=(al.listenCount||0)+1;al.lastListened=Date.now();}
saveData();
}

/* ══════════════════════════════════════════
CHARTS
══════════════════════════════════════════ */
function destroyChart(k){ if(charts[k]){charts[k].destroy();delete charts[k];} }
Chart.defaults.color=’#6b7280’; Chart.defaults.font.family=”‘Fira Code’,monospace”; Chart.defaults.font.size=10;
function mkGrad(ctx,c1,c2){ const g=ctx.createLinearGradient(0,0,0,150); g.addColorStop(0,c1); g.addColorStop(1,c2); return g; }

function renderArtistChart(ar){
destroyChart(‘artist’); const canvas=document.getElementById(‘artist-chart’); if(!canvas)return;
const ctx=canvas.getContext(‘2d’); const sorted=sortedAlbums(ar);
const labels=sorted.map(al=>al.name.length>13?al.name.slice(0,12)+’…’:al.name);
const vals=sorted.map(al=>albumAvg(al));
charts[‘artist’]=new Chart(ctx,{type:‘line’,data:{labels,datasets:[{data:vals,borderColor:’#c8a84b’,backgroundColor:mkGrad(ctx,‘rgba(200,168,75,0.3)’,‘rgba(200,168,75,0)’),borderWidth:2,tension:.4,fill:true,pointRadius:6,pointBackgroundColor:’#c8a84b’,pointBorderColor:’#08090d’,pointBorderWidth:2,pointHoverRadius:9,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},plugins:{legend:{display:false},tooltip:{backgroundColor:’#1e2233’,borderColor:’#2e3448’,borderWidth:1,padding:10,titleColor:’#e2e4ef’,bodyColor:’#7b829e’,callbacks:{label:ctx=>` ${ctx.parsed.y!==undefined?ctx.parsed.y.toFixed(1):'—'}`}}},scales:{x:{grid:{color:’#1e2233’},ticks:{color:’#454b65’,maxRotation:30,font:{size:9}},border:{color:’#252a3a’}},y:{min:0,max:10,grid:{color:’#1e2233’},ticks:{color:’#454b65’,stepSize:2},border:{color:’#252a3a’}}}}});
}

function renderAlbumChart(al){
destroyChart(‘album’); const canvas=document.getElementById(‘album-chart’); if(!canvas)return;
const ctx=canvas.getContext(‘2d’);
const labels=al.songs.map((s,i)=>`${i+1}`);
const vals=al.songs.map(s=>s.rating!==null?s.rating:null);
const a=albumAvg(al);
const datasets=[{label:‘Rating’,data:vals,borderColor:’#5acea0’,backgroundColor:mkGrad(ctx,‘rgba(90,206,160,0.25)’,‘rgba(90,206,160,0)’),borderWidth:2,tension:.35,fill:true,pointRadius:5,pointBackgroundColor:’#5acea0’,pointBorderColor:’#08090d’,pointBorderWidth:2,pointHoverRadius:8,spanGaps:true}];
if(a!==null) datasets.push({label:‘Avg’,data:al.songs.map(()=>a),borderColor:‘rgba(200,168,75,0.6)’,backgroundColor:‘transparent’,borderWidth:1.5,borderDash:[6,4],pointRadius:0,tension:0});
charts[‘album’]=new Chart(ctx,{type:‘line’,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{backgroundColor:’#1e2233’,borderColor:’#2e3448’,borderWidth:1,padding:10,titleColor:’#e2e4ef’,bodyColor:’#7b829e’,callbacks:{title:items=>`Track ${items[0].label}`,label:ctx=>` ${ctx.parsed.y!==null?ctx.parsed.y.toFixed(1):'—'}`}}},scales:{x:{grid:{color:’#1e2233’},ticks:{color:’#454b65’},border:{color:’#252a3a’}},y:{min:0,max:10,grid:{color:’#1e2233’},ticks:{color:’#454b65’,stepSize:2},border:{color:’#252a3a’}}}}});
}

artists.forEach(ar=>{

ar.albums.forEach(al=>{
if(al.name.toLowerCase().includes(q)) albumResults.push({al,ar});
al.songs.forEach(s=>{ if(s.name.toLowerCase().includes(q)) songResults.push({s,al,ar}); });
});
});

if(q){

} else {

</select>
</div>

  </div>`;

document.getElementById(‘content’).innerHTML=html;

// Attach change listeners
document.getElementById(‘cmp-a’).addEventListener(‘change’,function(){
const [alid,aid]=this.value.split(’|’);
state.compareIds[0]=alid; state.compareIds[1]=state.compareIds[1]||’’;
renderComparePage();
});
document.getElementById(‘cmp-b’).addEventListener(‘change’,function(){
const [alid,aid]=this.value.split(’|’);
state.compareIds[1]=alid;
renderComparePage();
});

if(!state.compareIds[0]||!state.compareIds[1]) return;

const findAl=(id)=>{ for(const ar of data.artists) for(const al of ar.albums) if(al.id===id) return {al,ar}; return null; };
const A=findAl(state.compareIds[0]); const B=findAl(state.compareIds[1]);
if(!A||!B) return;

const aAvg=albumAvg(A.al); const bAvg=albumAvg(B.al);
const winner=aAvg!==null&&bAvg!==null?(aAvg>=bAvg?‘A’:‘B’):null;

let cmp=`<div class="compare-grid">
<div class="compare-card${winner==='A'?' compare-winner':''}">
${winner===‘A’?‘🏆 ‘:’’}
<div class="compare-name">${esc(A.al.name)}</div>
<div style="font-size:11px;color:var(--faint);margin-bottom:6px">${esc(A.ar.name)}</div>
<div class="compare-score ${rc(aAvg)}">${aAvg!==null?aAvg.toFixed(2):’—’}</div>
<div class="compare-bar-wrap"><div class="compare-bar" style="width:${aAvg!==null?aAvg*10:0}%"></div></div>
<div style="font-size:11px;color:var(--faint)">${A.al.songs.length} tracks</div>
</div>
<div class="compare-card${winner==='B'?' compare-winner':''}">
${winner===‘B’?‘🏆 ‘:’’}
<div class="compare-name">${esc(B.al.name)}</div>
<div style="font-size:11px;color:var(--faint);margin-bottom:6px">${esc(B.ar.name)}</div>
<div class="compare-score ${rc(bAvg)}">${bAvg!==null?bAvg.toFixed(2):’—’}</div>
<div class="compare-bar-wrap"><div class="compare-bar" style="width:${bAvg!==null?bAvg*10:0}%"></div></div>
<div style="font-size:11px;color:var(--faint)">${B.al.songs.length} tracks</div>
</div>

  </div>`;

// Song by song comparison (matched by position)
const len=Math.max(A.al.songs.length,B.al.songs.length);
if(len){
cmp+=`<div class="chart-section"><div class="chart-header"><div class="chart-title">Track by Track</div></div><div class="chart-wrap"><canvas id="cmp-chart"></canvas></div></div>`;
cmp+=`<div class="chart-section" style="padding:0 14px">`;

/* ══════════════════════════════════════════
SPOTIFY PKCE
══════════════════════════════════════════ */
function spotifyToken(){ return localStorage.getItem(‘sp_token’); }
function spotifyIsConnected(){ return !!spotifyToken()&&Date.now()<parseInt(localStorage.getItem(‘sp_expiry’)||‘0’); }
function spotifyDisconnect(){ [‘sp_token’,‘sp_expiry’,‘sp_verifier’,‘sp_state’].forEach(k=>localStorage.removeItem(k)); closeModal(); toast(‘Spotify disconnected’); }

async function sha256(plain){ const enc=new TextEncoder().encode(plain); const hash=await crypto.subtle.digest(‘SHA-256’,enc); return btoa(String.fromCharCode(…new Uint8Array(hash))).replace(/+/g,’-’).replace(///g,’*’).replace(/=+$/,’’); }
function randStr(len){ const arr=new Uint8Array(len); crypto.getRandomValues(arr); return btoa(String.fromCharCode(…arr)).replace(/+/g,’-’).replace(///g,’*’).replace(/=+$/,’’).slice(0,len); }

async function spotifyLogin(){
const verifier=randStr(64); const challenge=await sha256(verifier); const st=randStr(16);
localStorage.setItem(‘sp_verifier’,verifier); localStorage.setItem(‘sp_state’,st);
window.location=‘https://accounts.spotify.com/authorize?’+new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,response_type:‘code’,redirect_uri:SPOTIFY_REDIRECT,scope:SPOTIFY_SCOPES,code_challenge_method:‘S256’,code_challenge:challenge,state:st});
}

async function spotifyHandleCallback(){
const params=new URLSearchParams(window.location.search);
const code=params.get(‘code’); const st=params.get(‘state’);
if(!code){return;}
if(st!==localStorage.getItem(‘sp_state’)){history.replaceState({},’,’,SPOTIFY_REDIRECT);return;}
const verifier=localStorage.getItem(‘sp_verifier’);
const res=await fetch(‘https://accounts.spotify.com/api/token’,{method:‘POST’,headers:{‘Content-Type’:‘application/x-www-form-urlencoded’},body:new URLSearchParams({grant_type:‘authorization_code’,code,redirect_uri:SPOTIFY_REDIRECT,client_id:SPOTIFY_CLIENT_ID,code_verifier:verifier})});
const json=await res.json();
if(json.access_token){ localStorage.setItem(‘sp_token’,json.access_token); localStorage.setItem(‘sp_expiry’,Date.now()+(json.expires_in*1000)); localStorage.removeItem(‘sp_verifier’); localStorage.removeItem(‘sp_state’); toast(‘Spotify connected ✓’); }
history.replaceState({},’,’,SPOTIFY_REDIRECT);
}

async function spFetch(url){
const token=spotifyToken(); if(!token)return null;
const res=await fetch(url,{headers:{Authorization:’Bearer ’+token}});
if(res.status===401){spotifyDisconnect();return null;}
if(res.status===204)return null;
return res.json();
}

async function spotifySearch(q,type){ return spFetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=${type}&limit=8`); }
async function spotifyGetAlbumTracks(id){ return spFetch(`https://api.spotify.com/v1/albums/${id}/tracks?limit=50`); }
async function spotifyGetPlaylist(id){ return spFetch(`https://api.spotify.com/v1/playlists/${id}/tracks?limit=100&fields=items(track(name,artists,album(name,release_date,id)))`); }
async function spotifyGetUserPlaylists(){ return spFetch(‘https://api.spotify.com/v1/me/playlists?limit=50’); }
async function spotifyNowPlaying(){ return spFetch(‘https://api.spotify.com/v1/me/player/currently-playing’); }

el.innerHTML=`<div class="sp-results">${res.items.map(pl=>{ const img=pl.images?.[0]?.url||''; return `<div class=“sp-item” onclick=“importPlaylistById(’${pl.id}’,’${pl.name.replace(/’/g,”\’”).replace(/”/g,’\”’)}’)”>
${img?`<img class="sp-img" src="${img}" alt="">`:`<div class="sp-img" style="background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:18px">🎵</div>`}
<div class="sp-info"><div class="sp-name">${esc(pl.name)}</div><div class="sp-sub">${pl.tracks?.total||0} tracks</div></div>
<span class="sp-arrow">›</span>
</div>`; }).join('')}</div>`;
}

function submitPlaylistUrl(){
const raw=document.getElementById(‘pl-url-input’)?.value.trim(); if(!raw)return;
// Extract ID from URL or use as-is
let id=raw;
const match=raw.match(/playlist/([a-zA-Z0-9]+)/);
if(match) id=match[1];
id=id.split(’?’)[0].trim();
if(!id){toast(‘Invalid URL’,‘var(–red)’);return;}
importPlaylistById(id,‘Playlist’);
}

async function importPlaylistById(playlistId,playlistName){
const el=document.getElementById(‘pl-list’);
if(el) el.innerHTML=`<div class="sp-results"><div class="sp-loading">Loading tracks…</div></div>`;

// Fetch all tracks (paginate if needed)
let allTracks=[];
let url=`https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=100&fields=items(track(name,artists,album(name,release_date,id))),next`;
while(url){
const res=await spFetch(url);
if(!res?.items){break;}
allTracks=[…allTracks,…res.items.filter(i=>i?.track?.name)];
url=res.next||null;
}

if(!allTracks.length){toast(‘No tracks found’,‘var(–red)’);return;}

closeModal();

// Create a new album entry for this playlist under a “Playlists” artist
let ar=data.artists.find(a=>a.name===‘My Playlists’);
if(!ar){ar={id:uid(),name:‘My Playlists’,albums:[]};data.artists.push(ar);}

const songs=allTracks.map(i=>({
id:uid(),
name:`${i.track.name} — ${i.track.artists?.[0]?.name||''}`,
rating:null,
starred:false
}));

const al={id:uid(),name:playlistName,date:’’,songs,moods:[],notes:`Imported from Spotify playlist`,listenCount:0,lastListened:null};
ar.albums.push(al);
saveData();
navigateAlbum(ar.id,al.id);
toast(`Imported ${songs.length} tracks ✓`);
}
async function fetchNowPlaying(){
if(!spotifyIsConnected())return;
const json=await spotifyNowPlaying();
if(json?.is_playing&&json?.item){
nowPlayingData={trackName:json.item.name,albumName:json.item.album?.name,artistName:json.item.artists?.[0]?.name,year:json.item.album?.release_date?.slice(0,4)||’’,spotifyAlbumId:json.item.album?.id};
} else { nowPlayingData=null; }
const btn=document.getElementById(‘np-btn’);
if(btn){ btn.className=‘np-btn’+(nowPlayingData?’ on’:’’); btn.innerHTML=nowPlayingData?`<div class="np-pulse"></div><span class="np-label">${esc(nowPlayingData.trackName)}</span>`:’’; }
}

async function goToNowPlaying(){
if(!nowPlayingData)return;
const {artistName,albumName,trackName,year,spotifyAlbumId}=nowPlayingData;
let ar=data.artists.find(a=>a.name.toLowerCase()===artistName.toLowerCase());
if(!ar){ar={id:uid(),name:artistName,albums:[]};data.artists.push(ar);}
let al=ar.albums.find(a=>a.name.toLowerCase()===albumName.toLowerCase());
if(!al){
const tracks=await spotifyGetAlbumTracks(spotifyAlbumId);
const songs=(tracks?.items||[]).map(t=>({id:uid(),name:t.name,rating:null,starred:false}));
al={id:uid(),name:albumName,date:year?`${year}-01-01`:’’,songs,moods:[],notes:’’,listenCount:0,lastListened:null};
ar.albums.push(al); saveData(); toast(`Added ${artistName} · ${albumName}`);
}
logListen(artistName,albumName,trackName);
state={…state,view:‘album’,artistId:ar.id,albumId:al.id}; render();
setTimeout(()=>{
const idx=al.songs.findIndex(s=>s.name.toLowerCase()===trackName.toLowerCase());
if(idx>=0){ const rows=document.querySelectorAll(’.song-row’); if(rows[idx]){rows[idx].scrollIntoView({behavior:‘smooth’,block:‘center’}); rows[idx].classList.add(‘highlighted’); setTimeout(()=>rows[idx]?.classList.remove(‘highlighted’),2000);} }
},350);
}

function startPolling(){ if(!spotifyIsConnected())return; fetchNowPlaying(); clearInterval(npTimer); npTimer=setInterval(fetchNowPlaying,15000); }

/* ══════════════════════════════════════════
INIT
══════════════════════════════════════════ */
document.addEventListener(‘keydown’,e=>{if(e.key===‘Escape’)closeModal();});
spotifyHandleCallback().then(()=>{ loadData(); render(); startPolling(); });
</script>
