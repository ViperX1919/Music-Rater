<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music Rater">
<title>Music Rater</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--surf:#0f111a;--s2:#161924;--s3:#1e2233;
  --bdr:#252a3a;--b2:#2e3448;
  --acc:#c8a84b;--a2:#e2c577;--adim:rgba(200,168,75,.12);
  --txt:#e2e4ef;--dim:#7b829e;--fnt:#454b65;
  --grn:#5acea0;--yel:#e2c577;--red:#e07070;
  --r:10px;--rl:16px;--tr:.18s ease;
  --f1:'Cormorant',Georgia,serif;--f2:'DM Sans',sans-serif;--f3:'Fira Code',monospace;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
html{height:100%}
body{height:100%;width:100%;background:var(--bg);color:var(--txt);font-family:var(--f2);font-size:14px;line-height:1.6;overflow:hidden;position:fixed}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh}
/* Topbar */
#topbar{display:flex;align-items:center;gap:8px;padding:12px 14px;padding-top:calc(12px + var(--st));background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:20;touch-action:none;user-select:none;-webkit-user-select:none}
#logo{font-family:var(--f1);font-size:20px;font-weight:700;color:var(--acc);cursor:pointer;flex-shrink:0}
#breadcrumb{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--dim);flex:1;min-width:0;overflow:hidden}
.bci{cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color var(--tr);max-width:110px}
.bci:active,.bci.cur{color:var(--txt);font-weight:500}
.bcs{color:var(--fnt);flex-shrink:0}
#topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--r);font-family:var(--f2);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--tr);white-space:nowrap;padding:8px 14px}
.btn-p{background:var(--acc);color:#08090d}.btn-p:active{background:var(--a2)}
.btn-g{background:transparent;color:var(--dim);border:1px solid var(--b2)}.btn-g:active{background:var(--s2);color:var(--txt)}
.btn-d{background:transparent;color:var(--red);border:1px solid rgba(224,112,112,.3)}.btn-d:active{background:rgba(224,112,112,.1)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:7px}
.icon-btn{width:34px;height:34px;padding:0;border-radius:var(--r);background:transparent;border:1px solid var(--bdr);color:var(--fnt);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--tr);flex-shrink:0}
.icon-btn:active{color:var(--acc);border-color:var(--acc);background:var(--adim)}
/* Now Playing */
#np-btn{height:34px;padding:0 10px;border-radius:var(--r);background:transparent;border:1px solid var(--bdr);display:none;align-items:center;gap:6px;font-family:var(--f2);font-size:11px;cursor:pointer;transition:all var(--tr);flex-shrink:0;max-width:130px}
#np-btn.on{display:flex}
#np-btn:active{border-color:var(--grn);background:rgba(90,206,160,.1)}
.np-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
.np-lbl{color:var(--grn);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
/* Content */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px;padding-bottom:calc(24px + var(--sb));overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
/* Typography */
.page-title{font-family:var(--f1);font-size:36px;font-weight:700;line-height:1.05;margin-bottom:4px}
.page-title em{color:var(--acc);font-style:italic}
.page-sub{font-size:13px;color:var(--dim);margin-bottom:16px}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--fnt);margin-bottom:10px}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:13px 14px;cursor:pointer;transition:background var(--tr)}
.stat-card:active{background:var(--s2)}
.stat-val{font-family:var(--f3);font-size:22px;font-weight:500;color:var(--acc);line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--fnt);letter-spacing:1px;text-transform:uppercase}
/* Quick nav */
.quick-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
/* Search */
.search-wrap{margin-bottom:14px}
.search-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:10px 13px;font-family:var(--f2);font-size:15px;color:var(--txt);outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--acc)}
.search-inp::placeholder{color:var(--fnt)}
/* Sort */
.sort-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.sort-bar::-webkit-scrollbar{display:none}
.sort-pill{background:var(--s2);border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all var(--tr)}
.sort-pill.on{background:var(--adim);border-color:var(--acc);color:var(--a2)}
/* Artist grid */
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.artist-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 14px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.artist-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),transparent);opacity:0;transition:opacity var(--tr)}
.artist-card:active{background:var(--s2)}.artist-card:active::before{opacity:1}
.ac-av{width:38px;height:38px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:16px;font-weight:700;color:var(--acc);margin-bottom:10px;text-transform:uppercase}
.ac-nm{font-family:var(--f1);font-size:17px;font-weight:600;line-height:1.2;margin-bottom:2px}
.ac-mt{font-size:11px;color:var(--fnt);margin-bottom:8px}
.ac-sc{font-family:var(--f3);font-size:19px;font-weight:500}
/* Rating colours */
.rhi{color:var(--grn)}.rmd{color:var(--yel)}.rlo{color:var(--red)}.rna{color:var(--fnt)}
/* Chart */
.chart-box{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px;margin-bottom:20px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.chart-ttl{font-family:var(--f1);font-size:14px;font-weight:600;color:var(--dim)}
.chart-badge{font-family:var(--f3);font-size:12px;background:var(--adim);color:var(--a2);border:1px solid rgba(200,168,75,.2);border-radius:6px;padding:2px 9px}
.chart-wrap{height:160px;position:relative}
/* Album list */
.album-list{display:flex;flex-direction:column;gap:8px}
.album-row{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background var(--tr)}
.album-row:active{background:var(--s2)}
.al-yr{font-family:var(--f3);font-size:11px;color:var(--fnt);min-width:32px;flex-shrink:0}
.al-main{flex:1;min-width:0}
.al-nm{font-family:var(--f1);font-size:17px;font-weight:600;line-height:1.2}
.al-mt{font-size:11px;color:var(--fnt);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.mood-tag{font-size:10px;background:var(--s3);border:1px solid var(--bdr);border-radius:10px;padding:1px 7px;color:var(--dim)}
.al-sc{font-family:var(--f3);font-size:19px;font-weight:500;flex-shrink:0}
/* Album page */
.al-title{font-family:var(--f1);font-size:32px;font-weight:700;line-height:1.05;margin-bottom:2px}
.al-artist{font-family:var(--f1);font-size:17px;font-style:italic;color:var(--acc);margin-bottom:8px}
.meta-pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
.mpill{background:var(--s2);border:1px solid var(--bdr);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--dim)}
/* Notes */
.notes-ta{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:10px 13px;font-family:var(--f2);font-size:13px;color:var(--txt);outline:none;resize:none;min-height:60px;line-height:1.6;margin-bottom:16px;-webkit-appearance:none}
.notes-ta:focus{border-color:var(--acc)}
.notes-ta::placeholder{color:var(--fnt)}
/* Mood */
.mood-sel{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.mood-opt{font-size:11px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:3px 10px;color:var(--dim);cursor:pointer;transition:all var(--tr)}
.mood-opt.on{background:var(--adim);border-color:var(--acc);color:var(--a2)}
/* Song list */
.song-list{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.song-hdr{display:grid;grid-template-columns:24px 1fr 44px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--bdr);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--fnt)}
.song-row{display:grid;grid-template-columns:24px 1fr 44px;gap:8px;padding:11px 14px;align-items:center;border-bottom:1px solid var(--bdr);transition:background var(--tr)}
.song-row:last-of-type{border-bottom:none}
.song-row:active{background:var(--s2)}
.song-row.hl{background:rgba(90,206,160,.1)}
.song-num{font-family:var(--f3);font-size:11px;color:var(--fnt);text-align:center}
.song-body{display:flex;flex-direction:column;gap:5px;min-width:0}
.song-top{display:flex;align-items:center;gap:5px}
.song-nm{font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.star-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:0;opacity:.35;transition:opacity var(--tr);flex-shrink:0;line-height:1}
.star-btn.on{opacity:1}
.del-btn{background:none;border:none;font-size:12px;color:var(--fnt);cursor:pointer;padding:2px 3px;border-radius:4px;flex-shrink:0;transition:color var(--tr)}
.del-btn:active{color:var(--red)}
.rating-row{display:flex;align-items:center;gap:7px}
input[type=range].rslider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;background:var(--s3);outline:none;cursor:pointer}
input[type=range].rslider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 0 3px var(--adim)}
input[type=range].rslider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--acc);cursor:pointer;border:none}
.song-score{font-family:var(--f3);font-size:14px;font-weight:500;text-align:right;white-space:nowrap}
.add-row{padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:8px}
.add-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:7px 11px;font-family:var(--f2);font-size:13px;color:var(--txt);outline:none;-webkit-appearance:none}
.add-inp:focus{border-color:var(--acc)}
.add-inp::placeholder{color:var(--fnt)}
/* Action row */
.act-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
/* Top list */
.top-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.top-item:last-child{border-bottom:none}
.top-rank{font-family:var(--f3);font-size:12px;color:var(--fnt);min-width:20px;text-align:right;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-nm{font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-sub{font-size:11px;color:var(--fnt)}
.top-sc{font-family:var(--f3);font-size:15px;font-weight:500;flex-shrink:0}
/* Wrapped */
.wrapped-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.wrapped-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:15px}
.w-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--fnt);margin-bottom:5px}
.w-val{font-family:var(--f1);font-size:19px;font-weight:700;color:var(--txt);line-height:1.2}
.w-sub{font-size:11px;color:var(--dim);margin-top:3px}
.wacc{color:var(--acc)}
/* Compare */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.cmp-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px;text-align:center;transition:all var(--tr)}
.cmp-card.win{border-color:var(--acc);background:var(--adim)}
.cmp-nm{font-family:var(--f1);font-size:15px;font-weight:700;margin-bottom:4px}
.cmp-sc{font-family:var(--f3);font-size:30px;font-weight:500;margin:4px 0}
.cmp-bar-bg{height:5px;background:var(--s3);border-radius:3px;margin:8px 0;overflow:hidden}
.cmp-bar{height:100%;background:var(--acc);border-radius:3px;transition:width .6s ease}
.cmp-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.cmp-row:last-child{border-bottom:none}
/* Log */
.log-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.log-row:last-child{border-bottom:none}
.log-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-track{font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-meta{font-size:11px;color:var(--fnt)}
/* Decades */
.dec-hdr{font-family:var(--f1);font-size:22px;font-weight:700;color:var(--acc);border-bottom:1px solid var(--bdr);padding-bottom:6px;margin-bottom:12px}
/* Share card */
.share-card{background:linear-gradient(135deg,#0f111a,#1e2233);border:1px solid var(--b2);border-radius:var(--rl);padding:24px;margin-bottom:14px;text-align:center}
.sc-artist{font-family:var(--f1);font-size:13px;color:var(--acc);font-style:italic;margin-bottom:3px}
.sc-album{font-family:var(--f1);font-size:24px;font-weight:700;margin-bottom:8px}
.sc-score{font-family:var(--f3);font-size:50px;font-weight:500;color:var(--acc);line-height:1}
.sc-lbl{font-size:10px;color:var(--fnt);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.sc-songs{margin-top:16px;text-align:left}
.sc-song{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.sc-song:last-child{border-bottom:none}
/* Spotify results */
.sp-box{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;margin-top:6px;max-height:240px;overflow-y:auto}
.sp-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background var(--tr)}
.sp-item:last-child{border-bottom:none}
.sp-item:active{background:var(--s3)}
.sp-img{width:38px;height:38px;border-radius:4px;object-fit:cover;background:var(--s3);flex-shrink:0}
.sp-info{flex:1;min-width:0}
.sp-nm{font-size:13px;font-weight:500;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-sub{font-size:11px;color:var(--fnt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-arr{color:var(--fnt);font-size:15px;flex-shrink:0}
.sp-loading{padding:14px;text-align:center;font-size:12px;color:var(--fnt)}
/* Settings */
.set-sec{margin-bottom:18px}
.set-sec-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--fnt);margin-bottom:8px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:7px;gap:10px}
.set-title{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:1px}
.set-sub{font-size:11px;color:var(--fnt)}
.sp-conn-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--grn);font-weight:500}
.sp-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surf);border:1px solid var(--b2);border-radius:var(--rl) var(--rl) 0 0;padding:22px 20px;padding-bottom:calc(22px + var(--sb));width:100%;max-width:520px;max-height:85vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:var(--f1);font-size:21px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:13px}
.modal-lbl{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--fnt);margin-bottom:6px}
.modal-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:9px 12px;font-family:var(--f2);font-size:15px;color:var(--txt);outline:none;-webkit-appearance:none}
.modal-inp:focus{border-color:var(--acc)}
.modal-inp::placeholder{color:var(--fnt)}
textarea.modal-inp{resize:none;height:100px;line-height:1.6}
.modal-hint{font-size:11px;color:var(--fnt);margin-top:4px}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--fnt)}
.empty-ic{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-tt{font-family:var(--f1);font-size:19px;color:var(--dim);margin-bottom:6px}
.empty-st{font-size:12px;line-height:1.8}
/* Toast */
#toast{position:fixed;bottom:calc(16px + var(--sb));left:50%;transform:translateX(-50%) translateY(80px);background:var(--s3);border:1px solid var(--b2);border-radius:var(--r);padding:8px 15px;font-size:12px;color:var(--txt);z-index:200;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span id="logo">♩</span>
    <nav id="breadcrumb"></nav>
    <div id="topbar-right">
      <button id="np-btn"></button>
      <button class="icon-btn" id="btn-settings">⚙︎</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="toast"><div class="toast-dot" id="toast-dot"></div><span id="toast-msg"></span></div>
<script>
'use strict';
/* ─── Constants ─── */
const SP_CID      = 'd1aafa67bfa64379a48b4b4eb7f04079';
const SP_REDIRECT = 'https://viperx1919.github.io/Music-Rater/';
const SP_SCOPES   = 'user-read-private user-read-currently-playing user-read-playback-state playlist-read-private playlist-read-collaborative';
const STORE_KEY   = 'mr-v3';
const MOODS       = ['hype','chill','emotional','gym','focus','dark','fun','romantic','road trip','late night'];

/* ─── State ─── */
let D  = { artists:[], log:[] };              // data
let ST = { view:'home', aid:null, alid:null, sort:'alpha', q:'', cmpA:null, cmpB:null }; // app state
let CH = {};                                   // chart instances
let NP = null;                                 // now playing
let npTimer = null;

/* ─── Storage ─── */
function loadData() {
  try { const r = localStorage.getItem(STORE_KEY); if (r) D = JSON.parse(r); } catch(e){}
  if (!Array.isArray(D.artists)) D.artists = [];
  if (!Array.isArray(D.log))     D.log     = [];
  // Migrate old key
  if (!D.artists.length) {
    try { const o = localStorage.getItem('mrdata'); if (o) { const p=JSON.parse(o); if (p.artists?.length) D=p; }} catch(e){}
    try { const o = localStorage.getItem('mrdata-v2'); if (o) { const p=JSON.parse(o); if (p.artists?.length) D=p; }} catch(e){}
  }
  // Normalise
  D.artists.forEach(ar => {
    ar.id     = ar.id || uid();
    ar.albums = ar.albums || [];
    ar.albums.forEach(al => {
      al.id          = al.id || uid();
      al.songs       = al.songs || [];
      al.moods       = al.moods || [];
      al.notes       = al.notes || '';
      al.listenCount = al.listenCount || 0;
      al.lastListened= al.lastListened || null;
      al.songs.forEach(s => {
        s.id      = s.id || uid();
        s.starred = s.starred || false;
        if (s.rating === undefined) s.rating = null;
      });
    });
  });
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(D)); } catch(e) { toast('Save failed','var(--red)'); return; }
  toast('Saved ✓');
}

/* ─── Helpers ─── */
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s) { if (!s && s!==0) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function ini(s) { return (s||'?').trim().charAt(0).toUpperCase(); }
function rc(r)  { const n=Number(r); if (!r && r!==0) return 'rna'; return n>=8?'rhi':n>=6?'rmd':'rlo'; }
function fr(r)  { if (r===null||r===undefined||isNaN(Number(r))) return '—'; return Number(r).toFixed(1); }
function sAvg(songs) {
  const r=(songs||[]).filter(s=>s.rating!==null&&!isNaN(Number(s.rating)));
  return r.length ? r.reduce((a,b)=>a+Number(b.rating),0)/r.length : null;
}
function aAvg(al)  { return sAvg(al.songs); }
function arAvg(ar) { const v=(ar.albums||[]).map(aAvg).filter(v=>v!==null); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; }
function chrono(ar){ return [...(ar.albums||[])].sort((a,b)=>{ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return new Date(a.date)-new Date(b.date); }); }
function yr(al)    { return al.date ? new Date(al.date).getFullYear() : '—'; }
function fmtDate(ts){ return ts ? new Date(ts).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : ''; }
function debounce(fn,ms){ let t; return function(...a){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,a),ms); }; }
function toast(msg,col='var(--grn)'){
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-dot').style.background=col;
  const el=document.getElementById('toast');
  el.classList.add('show'); clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ─── CRUD ─── */
function getAr(aid)       { return D.artists.find(a=>a.id===aid); }
function getAl(aid,alid)  { return getAr(aid)?.albums.find(al=>al.id===alid); }
function getSong(aid,alid,sid){ return getAl(aid,alid)?.songs.find(s=>s.id===sid); }

function addArtist(name) {
  const ar={id:uid(),name:name.trim(),albums:[]}; D.artists.push(ar); save(); nav('artist',ar.id);
}
function delArtist(aid) {
  if (!confirm('Delete artist and all their data?')) return;
  D.artists=D.artists.filter(a=>a.id!==aid); save(); nav('home');
}
function addAlbum(aid,name,date) {
  const ar=getAr(aid); if(!ar) return;
  const al={id:uid(),name:name.trim(),date:date||'',songs:[],moods:[],notes:'',listenCount:0,lastListened:null};
  ar.albums.push(al); save(); nav('album',aid,al.id);
}
function delAlbum(aid,alid) {
  if (!confirm('Delete this album?')) return;
  const ar=getAr(aid); if(!ar) return;
  ar.albums=ar.albums.filter(al=>al.id!==alid); save(); nav('artist',aid);
}
function addSongs(aid,alid,names) {
  const al=getAl(aid,alid); if(!al) return;
  names.forEach(n=>{ if(n.trim()) al.songs.push({id:uid(),name:n.trim(),rating:null,starred:false}); });
  save(); render();
}
function delSong(aid,alid,sid) {
  const al=getAl(aid,alid); if(!al) return;
  al.songs=al.songs.filter(s=>s.id!==sid); save(); render();
}
function toggleStar(aid,alid,sid) {
  const s=getSong(aid,alid,sid); if(!s) return;
  s.starred=!s.starred; save();
  const btn=document.getElementById('star-'+sid);
  if (btn) { btn.textContent=s.starred?'⭐':'☆'; btn.classList.toggle('on',s.starred); }
}
function setRating(aid,alid,sid,val) {
  const ar=getAr(aid),al=getAl(aid,alid),s=getSong(aid,alid,sid); if(!s) return;
  s.rating=Number(val); save();
  const rv=document.getElementById('rv-'+sid);
  if(rv){rv.textContent=fr(s.rating);rv.className='song-score '+rc(s.rating);}
  drawAlbumChart(al);
  const badge=document.getElementById('alb-avg');
  const a=aAvg(al); if(badge){badge.textContent=a!==null?a.toFixed(2):'—';badge.className='chart-badge '+rc(a);}
}
function saveNotes(aid,alid,val){ const al=getAl(aid,alid); if(al){al.notes=val;save();} }
function toggleMood(aid,alid,mood){
  const al=getAl(aid,alid); if(!al) return;
  const i=al.moods.indexOf(mood);
  if(i>=0)al.moods.splice(i,1);else al.moods.push(mood);
  save();
  document.querySelectorAll('.mood-opt').forEach(el=>el.classList.toggle('on',al.moods.includes(el.dataset.mood)));
}
function logListen(artistName,albumName,trackName) {
  D.log.unshift({ts:Date.now(),artist:artistName,album:albumName,track:trackName});
  if(D.log.length>500) D.log=D.log.slice(0,500);
  const ar=D.artists.find(a=>a.name.toLowerCase()===artistName.toLowerCase());
  const al=ar?.albums.find(al=>al.name.toLowerCase()===albumName.toLowerCase());
  if(al){al.listenCount=(al.listenCount||0)+1;al.lastListened=Date.now();}
  save();
}

/* ─── Navigation ─── */
function nav(view,aid,alid) {
  if (view==='artist' && !getAr(aid)) { toast('Artist not found','var(--red)'); return; }
  if (view==='album'  && !getAl(aid,alid)) { toast('Album not found','var(--red)'); return; }
  ST={...ST,view,aid:aid||null,alid:alid||null}; render();
}

/* ─── Charts ─── */
function killChart(k){ if(CH[k]){CH[k].destroy();delete CH[k];} }
Chart.defaults.color='#6b7280'; Chart.defaults.font.family="'Fira Code',monospace"; Chart.defaults.font.size=10;
function grad(ctx,c1,c2){ const g=ctx.createLinearGradient(0,0,0,150); g.addColorStop(0,c1);g.addColorStop(1,c2);return g; }
const scaleOpts = { x:{grid:{color:'#1e2233'},ticks:{color:'#454b65',maxRotation:30,font:{size:9}},border:{color:'#252a3a'}}, y:{min:0,max:10,grid:{color:'#1e2233'},ticks:{color:'#454b65',stepSize:2},border:{color:'#252a3a'}} };
const tipOpts   = {backgroundColor:'#1e2233',borderColor:'#2e3448',borderWidth:1,padding:10,titleColor:'#e2e4ef',bodyColor:'#7b829e'};

function drawArtistChart(ar) {
  killChart('artist'); const c=document.getElementById('artist-chart'); if(!c)return;
  const ctx=c.getContext('2d'), sorted=chrono(ar);
  CH['artist']=new Chart(ctx,{type:'line',data:{labels:sorted.map(al=>al.name.length>13?al.name.slice(0,12)+'…':al.name),datasets:[{data:sorted.map(aAvg),borderColor:'#c8a84b',backgroundColor:grad(ctx,'rgba(200,168,75,.3)','rgba(200,168,75,0)'),borderWidth:2,tension:.4,fill:true,pointRadius:6,pointBackgroundColor:'#c8a84b',pointBorderColor:'#08090d',pointBorderWidth:2,pointHoverRadius:9,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:450},plugins:{legend:{display:false},tooltip:tipOpts},scales:scaleOpts}});
}

function drawAlbumChart(al) {
  killChart('album'); const c=document.getElementById('album-chart'); if(!c)return;
  const ctx=c.getContext('2d'), avg=aAvg(al);
  const ds=[{label:'Rating',data:al.songs.map(s=>s.rating!==null?Number(s.rating):null),borderColor:'#5acea0',backgroundColor:grad(ctx,'rgba(90,206,160,.25)','rgba(90,206,160,0)'),borderWidth:2,tension:.35,fill:true,pointRadius:5,pointBackgroundColor:'#5acea0',pointBorderColor:'#08090d',pointBorderWidth:2,pointHoverRadius:8,spanGaps:true}];
  if(avg!==null) ds.push({label:'Avg',data:al.songs.map(()=>avg),borderColor:'rgba(200,168,75,.6)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[6,4],pointRadius:0,tension:0});
  CH['album']=new Chart(ctx,{type:'line',data:{labels:al.songs.map((_,i)=>String(i+1)),datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{...tipOpts,callbacks:{title:i=>`Track ${i[0].label}`}}},scales:scaleOpts}});
}

/* ─── Render ─── */
function render() {
  renderBreadcrumb(); renderTopbar();
  ({home:viewHome,artist:viewArtist,album:viewAlbum,log:viewLog,decades:viewDecades,top10:viewTop10,wrapped:viewWrapped,compare:viewCompare}[ST.view]||viewHome)();
}

function renderBreadcrumb() {
  const ar=ST.aid?getAr(ST.aid):null, al=ar&&ST.alid?getAl(ST.aid,ST.alid):null;
  const vl={log:'Listen Log',decades:'By Decade',top10:'Top 10',wrapped:'Wrapped',compare:'Compare'};
  let h=`<span class="bci${ST.view==='home'?' cur':''}" data-go="home">Library</span>`;
  if(vl[ST.view]) h+=`<span class="bcs">›</span><span class="bci cur">${vl[ST.view]}</span>`;
  if(ar) h+=`<span class="bcs">›</span><span class="bci${ST.view==='artist'?' cur':''}" data-go="artist" data-aid="${ar.id}">${esc(ar.name)}</span>`;
  if(al) h+=`<span class="bcs">›</span><span class="bci cur">${esc(al.name)}</span>`;
  document.getElementById('breadcrumb').innerHTML=h;
}

function renderTopbar() {
  const ar=ST.aid?getAr(ST.aid):null, al=ar&&ST.alid?getAl(ST.aid,ST.alid):null;
  // NP button
  const np=document.getElementById('np-btn');
  if(NP){np.className='on';np.innerHTML=`<div class="np-dot"></div><span class="np-lbl">${esc(NP.trackName)}</span>`;}
  else{np.className='';np.innerHTML='';}
  // Remove old dynamic buttons
  document.querySelectorAll('#topbar-right .dyn').forEach(b=>b.remove());
  const insert=(html)=>{ const tmp=document.createElement('div'); tmp.innerHTML=html; Array.from(tmp.children).forEach(c=>{c.classList.add('dyn');document.getElementById('topbar-right').insertBefore(c,document.getElementById('btn-settings'));}); };
  if(ST.view==='home'){
    let h=`<button class="btn btn-p btn-sm" id="tb-add-ar">+ Artist</button>`;
    if(spOk()) h=`<button class="btn btn-g btn-sm" id="tb-playlist">🎵</button>`+h;
    insert(h);
  } else if(ST.view==='artist'&&ar){
    let h=`<button class="btn btn-p btn-sm" id="tb-add-al" data-aid="${ar.id}">+ Album</button>`;
    if(spOk()) h=`<button class="btn btn-g btn-sm" id="tb-all-al" data-aid="${ar.id}">+ All</button>`+h;
    insert(h);
  } else if(ST.view==='album'&&al){
    insert(`<button class="btn btn-p btn-sm" id="tb-add-songs" data-aid="${ST.aid}" data-alid="${al.id}">+ Songs</button>`);
  }
}

/* ─── Views ─── */
function artistCardHTML(ar){ const a=arAvg(ar); return `<div class="artist-card" data-go="artist" data-aid="${ar.id}"><div class="ac-av">${ini(ar.name)}</div><div class="ac-nm">${esc(ar.name)}</div><div class="ac-mt">${ar.albums.length} album${ar.albums.length!==1?'s':''}</div><div class="ac-sc ${rc(a)}">${fr(a)} <span style="font-size:10px;color:var(--fnt);font-family:var(--f2)">/10</span></div></div>`; }
function albumRowHTML(al,ar){ const a=aAvg(al); return `<div class="album-row" data-go="album" data-aid="${ar.id}" data-alid="${al.id}"><span class="al-yr">${yr(al)}</span><div class="al-main"><div class="al-nm">${esc(al.name)}</div><div class="al-mt">${al.songs.length} tracks${al.lastListened?` · ${fmtDate(al.lastListened)}`:''}${al.moods.slice(0,2).map(m=>`<span class="mood-tag">${m}</span>`).join('')}</div></div><div class="al-sc ${rc(a)}">${fr(a)}</div></div>`; }

function viewHome() {
  const {artists}=D;
  const totAl=artists.reduce((a,b)=>a+b.albums.length,0);
  const totR =artists.reduce((a,ar)=>a+ar.albums.reduce((b,al)=>b+al.songs.filter(s=>s.rating!==null).length,0),0);
  document.getElementById('content').innerHTML=`
    <h1 class="page-title">Your <em>Library</em></h1>
    <div class="stats-row">
      <div class="stat-card" data-go="top10"><div class="stat-val">${artists.length}</div><div class="stat-lbl">Artists</div></div>
      <div class="stat-card" data-go="decades"><div class="stat-val">${totAl}</div><div class="stat-lbl">Albums</div></div>
      <div class="stat-card" data-go="wrapped"><div class="stat-val">${totR}</div><div class="stat-lbl">Rated</div></div>
    </div>
    <div class="quick-nav">
      <button class="btn btn-g btn-sm" data-go="log">📋 Log</button>
      <button class="btn btn-g btn-sm" data-go="decades">📅 Decades</button>
      <button class="btn btn-g btn-sm" data-go="top10">🏆 Top 10</button>
      <button class="btn btn-g btn-sm" data-go="wrapped">🎁 Wrapped</button>
      <button class="btn btn-g btn-sm" data-go="compare">⚖️ Compare</button>
    </div>
    <div class="search-wrap"><input id="home-q" class="search-inp" type="text" placeholder="Search artists, albums, songs…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" value="${esc(ST.q)}"></div>
    <div id="home-results"></div>`;
  // Search — addEventListener keeps keyboard open
  const qEl=document.getElementById('home-q');
  qEl.addEventListener('input',()=>{ ST.q=qEl.value; renderHomeResults(); });
  renderHomeResults();
}

function renderHomeResults() {
  const el=document.getElementById('home-results'); if(!el) return;
  const q=(ST.q||'').toLowerCase().trim();
  const {artists}=D;
  if(q) {
    const ars=[],als=[],sgs=[];
    artists.forEach(ar=>{
      if(ar.name.toLowerCase().includes(q)) ars.push(ar);
      ar.albums.forEach(al=>{
        if(al.name.toLowerCase().includes(q)) als.push({al,ar});
        al.songs.forEach(s=>{ if(s.name.toLowerCase().includes(q)) sgs.push({s,al,ar}); });
      });
    });
    if(!ars.length&&!als.length&&!sgs.length){ el.innerHTML=`<div class="empty"><div class="empty-ic">🔍</div><div class="empty-tt">No matches</div></div>`; return; }
    let h='';
    if(ars.length) h+=`<div class="sec-lbl">Artists</div><div class="artist-grid">${ars.map(artistCardHTML).join('')}</div>`;
    if(als.length) h+=`<div class="sec-lbl" style="margin-top:14px">Albums</div><div class="album-list">${als.slice(0,8).map(({al,ar})=>albumRowHTML(al,ar)).join('')}</div>`;
    if(sgs.length) h+=`<div class="sec-lbl" style="margin-top:14px">Songs</div><div class="chart-box" style="padding:0 14px">${sgs.slice(0,12).map(({s,al,ar})=>`<div class="top-item" style="cursor:pointer" data-go="album" data-aid="${ar.id}" data-alid="${al.id}"><span class="top-rank">${s.starred?'⭐':'♩'}</span><div class="top-info"><div class="top-nm">${esc(s.name)}</div><div class="top-sub">${esc(ar.name)} · ${esc(al.name)}</div></div><span class="top-sc ${rc(s.rating)}">${fr(s.rating)}</span></div>`).join('')}</div>`;
    el.innerHTML=h;
  } else {
    let sorted=[...artists];
    if(ST.sort==='alpha')  sorted.sort((a,b)=>a.name.localeCompare(b.name));
    else if(ST.sort==='rating') sorted.sort((a,b)=>(arAvg(b)||0)-(arAvg(a)||0));
    else if(ST.sort==='albums') sorted.sort((a,b)=>b.albums.length-a.albums.length);
    else if(ST.sort==='recent') sorted.sort((a,b)=>Math.max(0,...b.albums.map(al=>al.lastListened||0))-Math.max(0,...a.albums.map(al=>al.lastListened||0)));
    const pills=[['alpha','A–Z'],['rating','Top Rated'],['albums','Most Albums'],['recent','Recently Played']];
    let h=`<div class="sort-bar">${pills.map(([k,l])=>`<span class="sort-pill${ST.sort===k?' on':''}" data-sort="${k}">${l}</span>`).join('')}</div>`;
    h+=sorted.length?`<div class="artist-grid">${sorted.map(artistCardHTML).join('')}</div>`:`<div class="empty"><div class="empty-ic">🎵</div><div class="empty-tt">No artists yet</div><div class="empty-st">Tap <strong>+ Artist</strong> to get started.</div></div>`;
    el.innerHTML=h;
  }
}

function viewArtist() {
  const ar=getAr(ST.aid); if(!ar){nav('home');return;}
  const a=arAvg(ar),sorted=chrono(ar);
  let h=`<h1 class="page-title">${esc(ar.name)}</h1><div class="act-row">${a!==null?`<span class="mpill">Avg: <strong class="${rc(a)}">${a.toFixed(2)}</strong> / 10</span>`:''}<span class="mpill">${ar.albums.length} albums</span><button class="btn btn-d btn-sm" data-del-artist="${ar.id}">Delete</button></div>`;
  if(sorted.length){
    h+=`<div class="chart-box"><div class="chart-hdr"><div class="chart-ttl">Album Ratings · Over Time</div>${a!==null?`<span class="chart-badge ${rc(a)}">${a.toFixed(2)}</span>`:''}</div><div class="chart-wrap"><canvas id="artist-chart"></canvas></div></div>`;
    h+=`<div class="sec-lbl">Albums · Chronological</div><div class="album-list">${sorted.map(al=>albumRowHTML(al,ar)).join('')}</div>`;
  } else {
    h+=`<div class="empty"><div class="empty-ic">💿</div><div class="empty-tt">No albums yet</div><div class="empty-st">Tap <strong>+ Album</strong> to add one.</div></div>`;
  }
  document.getElementById('content').innerHTML=h;
  if(sorted.length) drawArtistChart(ar);
}

function viewAlbum() {
  const ar=getAr(ST.aid),al=getAl(ST.aid,ST.alid);
  if(!al){nav('artist',ST.aid);return;}
  const a=aAvg(al),starred=al.songs.filter(s=>s.starred);
  let h=`<div class="al-title">${esc(al.name)}</div><div class="al-artist">${esc(ar.name)}</div>
    <div class="meta-pills">
      ${al.date?`<span class="mpill">${yr(al)}</span>`:''}
      <span class="mpill">${al.songs.length} tracks</span>
      ${a!==null?`<span class="mpill">Avg: <strong class="${rc(a)}">${a.toFixed(2)}</strong></span>`:''}
      ${starred.length?`<span class="mpill">⭐ ${starred.length}</span>`:''}
      ${al.listenCount?`<span class="mpill">▶ ${al.listenCount}</span>`:''}
      <button class="btn btn-d btn-sm" data-del-album="${ST.aid}|${al.id}">Delete</button>
      <button class="btn btn-g btn-sm" data-share="${ST.aid}|${al.id}">Share</button>
    </div>
    <div class="sec-lbl">Notes</div>
    <textarea class="notes-ta" id="notes-ta" placeholder="Your thoughts on this album…">${esc(al.notes||'')}</textarea>
    <div class="sec-lbl">Vibes</div>
    <div class="mood-sel">${MOODS.map(m=>`<span class="mood-opt${al.moods.includes(m)?' on':''}" data-mood="${m}" data-aid="${ST.aid}" data-alid="${al.id}">${m}</span>`).join('')}</div>`;
  if(al.songs.length){
    h+=`<div class="chart-box"><div class="chart-hdr"><div class="chart-ttl">Song Ratings</div><span id="alb-avg" class="chart-badge ${rc(a)}">${a!==null?a.toFixed(2):'—'}</span></div><div class="chart-wrap"><canvas id="album-chart"></canvas></div></div>`;
  }
  h+=`<div class="sec-lbl">Tracklist</div>`;
  if(al.songs.length){
    h+=`<div class="song-list"><div class="song-hdr"><span>#</span><span>Title</span><span style="text-align:right">Score</span></div>`;
    h+=al.songs.map((s,i)=>{
      const rv=(s.rating!==null&&!isNaN(Number(s.rating)))?Number(s.rating):5;
      return `<div class="song-row" id="sr-${s.id}">
        <span class="song-num">${i+1}</span>
        <div class="song-body">
          <div class="song-top">
            <button class="star-btn${s.starred?' on':''}" id="star-${s.id}" data-star="${ST.aid}|${ST.alid}|${s.id}">${s.starred?'⭐':'☆'}</button>
            <span class="song-nm">${esc(s.name)}</span>
            <button class="del-btn" data-del-song="${ST.aid}|${ST.alid}|${s.id}">✕</button>
          </div>
          <div class="rating-row">
            <input type="range" class="rslider" min="0" max="10" step="0.1" value="${rv}"
              data-rate="${ST.aid}|${ST.alid}|${s.id}">
          </div>
        </div>
        <div class="song-score ${rc(s.rating)}" id="rv-${s.id}">${fr(s.rating)}</div>
      </div>`;
    }).join('');
    h+=`<div class="add-row"><input class="add-inp" id="quick-add" type="text" placeholder="Add a song…" autocomplete="off"><button class="btn btn-g btn-sm" id="btn-quick-add" data-aid="${ST.aid}" data-alid="${al.id}">Add</button></div></div>`;
  } else {

function viewWrapped() {
  const songs=[],albums=[];

  songs.sort((a,b)=>Number(b.s.rating)-Number(a.s.rating)); albums.sort((a,b)=>b.a-a.a);
  const topSong=songs[0],topAlbum=albums[0],botAlbum=[...albums].sort((a,b)=>a.a-b.a)[0];
  const ml=D.artists.flatMap(ar=>ar.albums.map(al=>({al,ar}))).sort((a,b)=>(b.al.listenCount||0)-(a.al.listenCount||0))[0];

function viewCompare() {
  const all=[];
  D.artists.forEach(ar=>ar.albums.forEach(al=>all.push({al,ar})));

    <div class="cmp-grid">
      <div><div class="sec-lbl">Album A</div><select class="modal-inp" id="cmp-a"><option value="">Pick…</option>${all.map(({al,ar})=>`<option value="${al.id}"${ST.cmpA===al.id?' selected':''}>${esc(ar.name)} — ${esc(al.name)}</option>`).join('')}</select></div>
      <div><div class="sec-lbl">Album B</div><select class="modal-inp" id="cmp-b"><option value="">Pick…</option>${all.map(({al,ar})=>`<option value="${al.id}"${ST.cmpB===al.id?' selected':''}>${esc(ar.name)} — ${esc(al.name)}</option>`).join('')}</select></div>

    h+=`<div class="cmp-grid">
      <div class="cmp-card${win==='A'?' win':''}"><div class="cmp-nm">${win==='A'?'🏆 ':''}${esc(A.al.name)}</div><div style="font-size:11px;color:var(--fnt)">${esc(A.ar.name)}</div><div class="cmp-sc ${rc(aA)}">${aA!==null?aA.toFixed(2):'—'}</div><div class="cmp-bar-bg"><div class="cmp-bar" style="width:${aA!==null?aA*10:0}%"></div></div><div style="font-size:11px;color:var(--fnt)">${A.al.songs.length} tracks</div></div>
      <div class="cmp-card${win==='B'?' win':''}"><div class="cmp-nm">${win==='B'?'🏆 ':''}${esc(B.al.name)}</div><div style="font-size:11px;color:var(--fnt)">${esc(B.ar.name)}</div><div class="cmp-sc ${rc(aB)}">${aB!==null?aB.toFixed(2):'—'}</div><div class="cmp-bar-bg"><div class="cmp-bar" style="width:${aB!==null?aB*10:0}%"></div></div><div style="font-size:11px;color:var(--fnt)">${B.al.songs.length} tracks</div></div>
    </div>`;
    const len=Math.max(A.al.songs.length,B.al.songs.length);

      h+=`<div class="chart-box"><div class="chart-hdr"><div class="chart-ttl">Track by Track</div></div><div class="chart-wrap"><canvas id="cmp-chart"></canvas></div></div>`;
      h+=`<div class="chart-box" style="padding:0 14px">`;

        const sa=A.al.songs[i],sb=B.al.songs[i];
        h+=`<div class="cmp-row"><span style="flex:1;text-align:right;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sa?esc(sa.name):''}</span><span style="font-family:var(--f3);font-size:11px;min-width:22px;text-align:center;color:var(--fnt);flex-shrink:0">${i+1}</span><span style="flex:1;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sb?esc(sb.name):''}</span><span class="${rc(sa?.rating)}" style="font-family:var(--f3);font-size:11px;min-width:26px;text-align:right;flex-shrink:0">${fr(sa?.rating)}</span><span style="color:var(--fnt);margin:0 4px;flex-shrink:0">vs</span><span class="${rc(sb?.rating)}" style="font-family:var(--f3);font-size:11px;min-width:26px;flex-shrink:0">${fr(sb?.rating)}</span></div>`;

  if(A&&B){
    const len=Math.max(A.al.songs.length,B.al.songs.length);
    if(len){
      const ctx=document.getElementById('cmp-chart')?.getContext('2d'); if(!ctx)return;
      killChart('cmp');
      CH['cmp']=new Chart(ctx,{type:'line',data:{labels:[...Array(len)].map((_,i)=>String(i+1)),datasets:[{label:A.al.name,data:A.al.songs.map(s=>s.rating),borderColor:'#c8a84b',backgroundColor:'rgba(200,168,75,.1)',borderWidth:2,tension:.35,pointRadius:4,pointBackgroundColor:'#c8a84b',spanGaps:true},{label:B.al.name,data:B.al.songs.map(s=>s.rating),borderColor:'#5acea0',backgroundColor:'rgba(90,206,160,.1)',borderWidth:2,tension:.35,pointRadius:4,pointBackgroundColor:'#5acea0',spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#7b829e',boxWidth:12,font:{size:10}}}},scales:scaleOpts}});
    }
  }
}

/* ─── Export / Import ─── */
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`music-rater-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(url); toast('Backup downloaded ✓');
}
function importFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{try{importJSON(ev.target.result);}catch(e){toast('Failed to read file','var(--red)');}}; r.readAsText(f); };
  inp.click();
}
function importJSON(raw){
  const p=JSON.parse(raw);
  if(!p.artists||!Array.isArray(p.artists)) throw new Error('Invalid');
  if(!confirm(`Replace library with backup? (${p.artists.length} artists)`))return;
  D=p; if(!D.log)D.log=[]; save(); nav('home'); toast('Library restored ✓');
}
function clearAll(){
  if(!confirm('Delete your ENTIRE library? Cannot be undone.'))return;
  if(!confirm('Really sure?'))return;
  D={artists:[],log:[]}; localStorage.removeItem(STORE_KEY);
  closeModal(); nav('home'); toast('Library cleared');
}

/* ─── Spotify PKCE ─── */
function spToken()  { return localStorage.getItem('sp_token'); }
function spOk()     { return !!spToken()&&Date.now()<parseInt(localStorage.getItem('sp_expiry')||'0'); }
function spDisconnect(){ ['sp_token','sp_expiry','sp_verifier','sp_state'].forEach(k=>localStorage.removeItem(k)); closeModal(); toast('Spotify disconnected'); renderTopbar(); }
async function sha256(s){ const e=new TextEncoder().encode(s),h=await crypto.subtle.digest('SHA-256',e); return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function randStr(n){ const a=new Uint8Array(n);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'').slice(0,n); }
async function spLogin(){
  const v=randStr(64),c=await sha256(v),s=randStr(16);
  localStorage.setItem('sp_verifier',v);localStorage.setItem('sp_state',s);
  window.location='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:SP_CID,response_type:'code',redirect_uri:SP_REDIRECT,scope:SP_SCOPES,code_challenge_method:'S256',code_challenge:c,state:s});
}
async function spHandleCallback(){
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code'),st=p.get('state');
  if(!code)return;
  if(st!==localStorage.getItem('sp_state')){history.replaceState({},'',SP_REDIRECT);return;}
  const v=localStorage.getItem('sp_verifier');
  try{
    const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:SP_REDIRECT,client_id:SP_CID,code_verifier:v})});
    const j=await res.json();
    if(j.access_token){localStorage.setItem('sp_token',j.access_token);localStorage.setItem('sp_expiry',String(Date.now()+j.expires_in*1000));localStorage.removeItem('sp_verifier');localStorage.removeItem('sp_state');toast('Spotify connected ✓');}
  }catch(e){}
  history.replaceState({},'',SP_REDIRECT);
}
async function spFetch(url){
  const t=spToken();if(!t)return null;
  const r=await fetch(url,{headers:{Authorization:'Bearer '+t}});
  if(r.status===401){spDisconnect();return null;}
  if(r.status===204||r.status===202)return null;
  return r.json();
}
async function spSearch(q,type){ return spFetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=${type}&limit=8`); }
async function spAlbumTracks(id){ return spFetch(`https://api.spotify.com/v1/albums/${id}/tracks?limit=50`); }
async function spArtistAlbums(id){ return spFetch(`https://api.spotify.com/v1/artists/${id}/albums?include_groups=album&limit=50&market=AU`); }
async function spNowPlaying(){ return spFetch('https://api.spotify.com/v1/me/player/currently-playing'); }
async function spUserPlaylists(){ return spFetch('https://api.spotify.com/v1/me/playlists?limit=50'); }
async function spPlaylistTracks(id,offset=0){ return spFetch(`https://api.spotify.com/v1/playlists/${id}/tracks?limit=100&offset=${offset}`); }

function spResultHTML(items,dataAttr){ return `<div class="sp-box">${items.map(x=>{ const img=x.images?.[2]?.url||x.images?.[0]?.url||''; const nm=x.name||x.album?.name||''; const sub=x.genres?.slice(0,2).join(', ')||x.artists?.[0]?.name||x.release_date?.slice(0,4)||''; return `<div class="sp-item" ${dataAttr(x)}>${img?`<img class="sp-img" src="${img}" alt="" style="${x.type==='artist'?'border-radius:50%':''}">`:`<div class="sp-img" style="${x.type==='artist'?'border-radius:50%':''}"></div>`}<div class="sp-info"><div class="sp-nm">${esc(nm)}</div><div class="sp-sub">${esc(sub)}</div></div><span class="sp-arr">›</span></div>`; }).join('')}</div>`; }

async function spArtistSearch(){
  const q=document.getElementById('m-aname')?.value.trim(),el=document.getElementById('sp-ar-res');if(!el)return;
  if(!q||q.length<2){el.innerHTML='';return;}
  el.innerHTML=`<div class="sp-box"><div class="sp-loading">Searching…</div></div>`;
  const res=await spSearch(q,'artist');
  const items=(res?.artists?.items||[]).filter(a=>a.name&&a.popularity>0).slice(0,5);
  if(!items.length){el.innerHTML=`<div class="sp-box"><div class="sp-loading">No results</div></div>`;return;}
  el.innerHTML=spResultHTML(items,x=>`data-sp-ar-sel="${esc(x.name)}"`);
}

function modalSpotifyAlbum(aid){
  openModal(`<div class="modal-title">🎵 Import from Spotify</div>
    <div class="modal-field"><label class="modal-lbl">Search Album</label><input class="modal-inp" id="sp-al-q" type="text" placeholder="e.g. DAMN., Mansion…" autocomplete="off"><div id="sp-al-res"></div></div>
    <div class="modal-acts"><button class="btn btn-g" data-close-modal>Cancel</button></div>`);
  document.getElementById('sp-al-q').addEventListener('input',debounce(async()=>{
    const q=document.getElementById('sp-al-q')?.value.trim(),el=document.getElementById('sp-al-res');if(!el)return;
    if(!q){el.innerHTML='';return;}
    el.innerHTML=`<div class="sp-box"><div class="sp-loading">Searching…</div></div>`;
    const res=await spSearch(q,'album');
    const items=(res?.albums?.items||[]);
    if(!items.length){el.innerHTML=`<div class="sp-box"><div class="sp-loading">No results</div></div>`;return;}
    el.innerHTML=spResultHTML(items,x=>`data-sp-al-import="${x.id}" data-sp-al-name="${esc(x.name)}" data-sp-al-year="${x.release_date?.slice(0,4)||''}" data-sp-al-aid="${aid}"`);
  },400));
}

async function importSpotifyAlbum(aid,spId,name,year){
  const el=document.getElementById('sp-al-res');if(el)el.innerHTML=`<div class="sp-box"><div class="sp-loading">Loading tracks…</div></div>`;
  const t=await spAlbumTracks(spId);if(!t?.items?.length){toast('Could not load tracks','var(--red)');return;}
  const ar=getAr(aid);if(!ar)return;
  const al={id:uid(),name,date:year?`${year}-01-01`:'',songs:t.items.map(s=>({id:uid(),name:s.name,rating:null,starred:false})),moods:[],notes:'',listenCount:0,lastListened:null};
  ar.albums.push(al);save();closeModal();nav('album',aid,al.id);toast(`Imported ${al.songs.length} tracks ✓`);
}

function modalAllAlbums(aid){
  const ar=getAr(aid);if(!ar)return;
  openModal(`<div class="modal-title">Import Discography</div>
    <div class="modal-field"><label class="modal-lbl">Find Artist on Spotify</label><input class="modal-inp" id="sp-disc-q" type="text" value="${esc(ar.name)}" autocomplete="off"><div id="sp-disc-res"></div></div>
    <div class="modal-acts"><button class="btn btn-g" data-close-modal>Cancel</button></div>`);
  const search=debounce(async()=>{
    const q=document.getElementById('sp-disc-q')?.value.trim(),el=document.getElementById('sp-disc-res');if(!el||!q)return;
    el.innerHTML=`<div class="sp-box"><div class="sp-loading">Searching…</div></div>`;
    const res=await spSearch(q,'artist');
    const items=(res?.artists?.items||[]).filter(a=>a.name).slice(0,5);
    if(!items.length){el.innerHTML=`<div class="sp-box"><div class="sp-loading">No results</div></div>`;return;}
    el.innerHTML=spResultHTML(items,x=>`data-sp-disc-import="${x.id}" data-sp-disc-aid="${aid}"`);
  },400);
  document.getElementById('sp-disc-q').addEventListener('input',search); search();
}

async function importAllAlbums(spArId,aid){
  const el=document.getElementById('sp-disc-res');if(el)el.innerHTML=`<div class="sp-box"><div class="sp-loading">Fetching discography…</div></div>`;
  const res=await spArtistAlbums(spArId);if(!res?.items?.length){toast('No albums found','var(--red)');return;}
  const seen=new Set();
  const unique=res.items.filter(al=>{const k=al.name.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;}).sort((a,b)=>(a.release_date||'').localeCompare(b.release_date||''));
  closeModal(); const ar=getAr(aid);if(!ar)return;
  let n=0;
  for(const sp of unique){
    if(ar.albums.some(a=>a.name.toLowerCase()===sp.name.toLowerCase()))continue;
    const t=await spAlbumTracks(sp.id);
    ar.albums.push({id:uid(),name:sp.name,date:sp.release_date?`${sp.release_date.slice(0,4)}-01-01`:'',songs:(t?.items||[]).map(s=>({id:uid(),name:s.name,rating:null,starred:false})),moods:[],notes:'',listenCount:0,lastListened:null});
    n++;
  }
  save();nav('artist',aid);toast(`Imported ${n} albums ✓`);
}

async function modalPlaylist(){
  openModal(`<div class="modal-title">🎵 Import Playlist</div>
    <div class="modal-field"><label class="modal-lbl">Your Playlists</label><div id="pl-list"><div class="sp-box"><div class="sp-loading">Loading…</div></div></div></div>
    <div class="modal-field"><label class="modal-lbl">Or paste a Playlist URL</label><input class="modal-inp" id="pl-url" type="text" placeholder="https://open.spotify.com/playlist/…" autocomplete="off"><div class="modal-hint">Paste the Spotify link or just the ID</div></div>
    <div class="modal-acts"><button class="btn btn-g" data-close-modal>Cancel</button><button class="btn btn-p" id="pl-url-ok">Import by URL</button></div>`);
  document.getElementById('pl-url-ok').onclick=()=>{
    let raw=document.getElementById('pl-url')?.value.trim()||'';
    const m=raw.match(/playlist\/([a-zA-Z0-9]+)/); const id=m?m[1]:raw.split('?')[0].trim();
    if(!id){toast('Invalid URL','var(--red)');return;} importPlaylist(id,'Playlist');
  };
  const res=await spUserPlaylists();
  const el=document.getElementById('pl-list');if(!el)return;
  if(!res?.items?.length){el.innerHTML=`<div class="sp-box"><div class="sp-loading">No playlists found</div></div>`;return;}
  el.innerHTML=spResultHTML(res.items.filter(p=>p),x=>`data-pl-import="${x.id}" data-pl-name="${esc(x.name)}"`);
}

async function importPlaylist(id,name){
  const el=document.getElementById('pl-list');if(el)el.innerHTML=`<div class="sp-box"><div class="sp-loading">Loading tracks…</div></div>`;
  let all=[],offset=0;
  while(true){
    const res=await spPlaylistTracks(id,offset);if(!res?.items?.length)break;
    all=[...all,...res.items.filter(i=>i?.track?.name)];
    if(!res.next||all.length>=500)break; offset+=100;
  }
  if(!all.length){toast('No tracks found','var(--red)');return;}
  closeModal();
  let ar=D.artists.find(a=>a.name==='My Playlists');
  if(!ar){ar={id:uid(),name:'My Playlists',albums:[]};D.artists.push(ar);}
  const songs=all.map(i=>({id:uid(),name:`${i.track.name}  —  ${i.track.artists?.[0]?.name||''}`,rating:null,starred:false}));
  const al={id:uid(),name,date:'',songs,moods:[],notes:'Imported from Spotify',listenCount:0,lastListened:null};
  ar.albums.push(al);save();nav('album',ar.id,al.id);toast(`Imported ${songs.length} tracks ✓`);
}

/* ─── Now Playing ─── */
async function pollNP(){
  if(!spOk())return;
  try{
    const j=await spNowPlaying();
    NP=j?.is_playing&&j?.item?{trackName:j.item.name,albumName:j.item.album?.name,artistName:j.item.artists?.[0]?.name,year:j.item.album?.release_date?.slice(0,4)||'',spAlbumId:j.item.album?.id}:null;
  }catch(e){NP=null;}
  const btn=document.getElementById('np-btn');if(!btn)return;
  if(NP){btn.className='on';btn.innerHTML=`<div class="np-dot"></div><span class="np-lbl">${esc(NP.trackName)}</span>`;}
  else{btn.className='';btn.innerHTML='';}
}
async function goToNP(){
  if(!NP)return;
  const{artistName,albumName,trackName,year,spAlbumId}=NP;
  let ar=D.artists.find(a=>a.name.toLowerCase()===artistName.toLowerCase());
  if(!ar){ar={id:uid(),name:artistName,albums:[]};D.artists.push(ar);}
  let al=ar.albums.find(a=>a.name.toLowerCase()===albumName.toLowerCase());
  if(!al){
    const t=await spAlbumTracks(spAlbumId);
    al={id:uid(),name:albumName,date:year?`${year}-01-01`:'',songs:(t?.items||[]).map(s=>({id:uid(),name:s.name,rating:null,starred:false})),moods:[],notes:'',listenCount:0,lastListened:null};
    ar.albums.push(al);save();toast(`Added ${artistName} · ${albumName}`);
  }
  logListen(artistName,albumName,trackName);
  nav('album',ar.id,al.id);
  setTimeout(()=>{
    const i=al.songs.findIndex(s=>s.name.toLowerCase()===trackName.toLowerCase());
    if(i>=0){const rows=document.querySelectorAll('.song-row');if(rows[i]){rows[i].scrollIntoView({behavior:'smooth',block:'center'});rows[i].classList.add('hl');setTimeout(()=>rows[i]?.classList.remove('hl'),2000);}}
  },350);
}

/* ─── Global Event Delegation ─── */
document.addEventListener('click',function(e){
  const t=e.target;
  // Close modal
  if(t.hasAttribute('data-close-modal')||t.closest('[data-close-modal]')){closeModal();return;}
  // Navigate
  const go=t.closest('[data-go]');
  if(go){
    const v=go.dataset.go,aid=go.dataset.aid,alid=go.dataset.alid;
    if(['log','decades','top10','wrapped','compare'].includes(v)){ST={...ST,view:v,aid:null,alid:null};render();return;}
    if(v==='home'){nav('home');return;}
    if(v==='artist'){nav('artist',aid);return;}
    if(v==='album'){nav('album',aid,alid);return;}
    return;
  }
  // Sort pill
  const sp=t.closest('[data-sort]');
  if(sp){ST.sort=sp.dataset.sort;renderHomeResults();return;}
  // Mood
  const mo=t.closest('[data-mood]');
  if(mo){toggleMood(mo.dataset.aid,mo.dataset.alid,mo.dataset.mood);return;}
  // Del artist
  const da=t.closest('[data-del-artist]');
  if(da){delArtist(da.dataset.delArtist);return;}
  // Del album
  const dal=t.closest('[data-del-album]');
  if(dal){const[aid,alid]=dal.dataset.delAlbum.split('|');delAlbum(aid,alid);return;}
  // Del song
  const ds=t.closest('[data-del-song]');
  if(ds){const[aid,alid,sid]=ds.dataset.delSong.split('|');delSong(aid,alid,sid);return;}
  // Star
  const st=t.closest('[data-star]');
  if(st){const[aid,alid,sid]=st.dataset.star.split('|');toggleStar(aid,alid,sid);return;}
  // Share
  const sh=t.closest('[data-share]');
  if(sh){const[aid,alid]=sh.dataset.share.split('|');showShareCard(aid,alid);return;}
  // Topbar dynamic buttons
  if(t.id==='tb-add-ar'){modalAddArtist();return;}
  if(t.id==='tb-add-al'){modalAddAlbum(t.dataset.aid);return;}
  if(t.id==='tb-all-al'){modalAllAlbums(t.dataset.aid);return;}
  if(t.id==='tb-add-songs'){modalAddSongs(t.dataset.aid,t.dataset.alid);return;}
  if(t.id==='tb-playlist'){modalPlaylist();return;}
  // Spotify artist select in modal
  const spar=t.closest('[data-sp-ar-sel]');
  if(spar){const inp=document.getElementById('m-aname');if(inp)inp.value=spar.dataset.spArSel;document.getElementById('sp-ar-res').innerHTML='';return;}
  // Spotify album import
  const spal=t.closest('[data-sp-al-import]');
  if(spal){importSpotifyAlbum(spal.dataset.spAlAid,spal.dataset.spAlImport,spal.dataset.spAlName,spal.dataset.spAlYear);return;}
  // Spotify discography import
  const spd=t.closest('[data-sp-disc-import]');
  if(spd){importAllAlbums(spd.dataset.spDiscImport,spd.dataset.spDiscAid);return;}
  // Playlist import
  const pl=t.closest('[data-pl-import]');
  if(pl){importPlaylist(pl.dataset.plImport,pl.dataset.plName||'Playlist');return;}
  // Quick add
  if(t.id==='btn-quick-add'){const inp=document.getElementById('quick-add');if(inp?.value.trim()){addSongs(t.dataset.aid,t.dataset.alid,[inp.value]);inp.value='';} return;}
});

// Sliders — input for live, change to save
document.getElementById('content').addEventListener('input',function(e){
  const t=e.target;
  if(t.dataset.rate){const[aid,alid,sid]=t.dataset.rate.split('|');const v=parseFloat(t.value);const rv=document.getElementById('rv-'+sid);if(rv){rv.textContent=v.toFixed(1);rv.className='song-score '+rc(v);}}
});
document.getElementById('content').addEventListener('change',function(e){
  const t=e.target;
  if(t.dataset.rate){const[aid,alid,sid]=t.dataset.rate.split('|');setRating(aid,alid,sid,parseFloat(t.value));}
});
// Quick add enter
document.getElementById('content').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target.id==='quick-add'){
    const btn=document.getElementById('btn-quick-add');
    if(btn&&e.target.value.trim()){addSongs(btn.dataset.aid,btn.dataset.alid,[e.target.value]);e.target.value='';}
  }
});

document.getElementById('logo').onclick=()=>nav('home');
document.getElementById('btn-settings').onclick=modalSettings;
document.getElementById('np-btn').onclick=goToNP;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ─── Init ─── */
async function init(){
  loadData();
  await spHandleCallback();
  render();
  if(spOk()){pollNP();npTimer=setInterval(pollNP,15000);}
}
init();
</script>
